<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>藏书阁</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 粒子画布 -->
  <canvas id="particle-canvas"></canvas>

  <!-- 开场交互层 -->
  <div class="landing">
    <h1 class="landing-title">藏 书 阁</h1>
    <p class="landing-subtitle">几何数据之海 · 论外文献馆</p>
    <button class="btn-enter" id="btn-enter">进 入 藏 书 阁</button>
  </div>

  <script src="js/particles.js"></script>
  <script>
    // 初始化粒子系统
    const particleSystem = initParticles();

    // 进入按钮
    document.getElementById('btn-enter').addEventListener('click', () => {
      // 销毁粒子系统
      if (particleSystem) particleSystem.destroy();
      // 跳转到 AOS 标准页
      window.location.href = 'category-aos.html';
    });
  </script>
</body>
</html>
